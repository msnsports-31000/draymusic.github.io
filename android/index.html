<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="icon" type="image/png" href="icon.png">
    <title>DrayMusic</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link href="google.css" rel="stylesheet">
</head>
<body class="win-dark">
    <img id="body-bg" src="gradient.gif" aria-hidden="true">
    <header class="app-header">
        <h1>DrayMusic</h1>
        <div class="search-pill">
            <span class="material-symbols-rounded">search</span>
            <input type="text" id="searchInput" placeholder="Search songs or artists...">
        </div>
    </header>

    <button id="navLeft" class="nav-arrow left" style="display: none;"><span class="material-symbols-rounded">chevron_left</span></button>
    <button id="navRight" class="nav-arrow right"><span class="material-symbols-rounded">chevron_right</span></button>

    <main class="scroll-area page-viewport">
        <div id="pageContainer" class="page-container">
            <section class="page" id="songList"></section>

            <section class="page" id="favoritesList">
                <div style="text-align: center;">
                    <h3>Your Favorites</h3>
                </div>
                <div id="favoritesContainer"></div>
            </section>

            <section class="page" id="playlistsList">

                <div id="playlistMainView">
                    <div style="padding: 0 0 20px 0;text-align: center;">
                        <h3>Playlists</h3>

                        <div style="display: flex; gap: 8px; margin-top: 15px; padding: 0 10px;">
                            <input type="text" id="pageNewPlaylistInput" placeholder="New Playlist Name" style="flex:1; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 8px 12px; border-radius: 8px; outline: none;">
                            <button id="btnPageCreatePlaylist" style="background: #00a0ff; background: var(--accent); color: white; border: none; padding: 8px 16px; border-radius: 8px; font-weight: 500;">Create</button>
                        </div>
                    </div>

                    <div id="playlistsContainer" class="playlist-grid-layout"></div>
                </div>

                <div id="playlistDetailView" style="display: none;">
                    <div style="padding: 10px 0 20px 0; display: flex; align-items: center; gap: 15px;">
                        <button id="btnBackToPlaylists" class="icon-btn" style="background: rgba(255,255,255,0.1); border-radius: 50%;"><span class="material-symbols-rounded">arrow_back</span></button>
                        <h3 id="detailPlaylistTitle" style="margin:0; color: white;">Playlist Name</h3>
                    </div>
                    <div id="playlistSongsContainer"></div>
                </div>
            </section>
        </div>
    </main>

    <div id="contextMenu" class="context-menu" style="display: none;">
        <div id="contextSongOptions">
            <h4>Add to Playlist</h4>
            <ul id="contextPlaylistItems"></ul>
            <div class="context-actions">
                <input type="text" id="newPlaylistInput" placeholder="New Playlist">
                <button id="btnCreatePlaylist">Add</button>
            </div>
        </div>
        <div id="contextPlaylistOptions" style="display: none;">
            <h4>Playlist Options</h4>
            <button id="btnRenamePlaylist" class="context-btn">Rename Playlist</button>
            <button id="btnDeletePlaylist" class="context-btn" style="color: #ff5252;">Delete Playlist</button>
        </div>
    </div>

    <section class="mini-player">
        <div class="progress-wrapper">
            <input type="range" id="seekBar" value="0" step="0.1">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="player-controls-row">
            <div class="track-info" id="openFullPlayer">
                <img id="currentArt" src="placeholder.png">
                <div class="text-group">
                    <h4 id="currentTitle">Not Playing</h4>
                    <p id="currentArtist">Select a song</p>
                </div>
            </div>

            <div class="action-btns">
                <button id="btnEQ" class="icon-btn wigdisable"><span class="material-symbols-rounded">tune</span></button>
                <button id="btnLoop" class="icon-btn"><span class="material-symbols-rounded">repeat</span></button>
                <button id="btnPrev" class="icon-btn"><span class="material-symbols-rounded">skip_previous</span></button>
                <button id="btnPlayPause" class="main-play-btn"><span class="material-symbols-rounded">play_arrow</span></button>
                <button id="btnNext" class="icon-btn"><span class="material-symbols-rounded">skip_next</span></button>
            </div>
        </div>
    </section>

    <div id="eqPane" class="side-pane">
        <div class="pane-header">
            <h2>Audio Settings</h2>
            <button id="btnCloseEQ" class="icon-btn"><span class="material-symbols-rounded">close</span></button>
        </div>

        <div class="pane-content">
            <div class="control-group">
                <h3>Equalizer</h3>
                <div class="eq-sliders 10-band">
                    <div class="eq-slider-col"><input type="range" class="eq-slider" id="eqSlider0" min="-12" max="12" value="0"><label>31</label></div>
                    <div class="eq-slider-col"><input type="range" class="eq-slider" id="eqSlider1" min="-12" max="12" value="0"><label>62</label></div>
                    <div class="eq-slider-col"><input type="range" class="eq-slider" id="eqSlider2" min="-12" max="12" value="0"><label>125</label></div>
                    <div class="eq-slider-col"><input type="range" class="eq-slider" id="eqSlider3" min="-12" max="12" value="0"><label>250</label></div>
                    <div class="eq-slider-col"><input type="range" class="eq-slider" id="eqSlider4" min="-12" max="12" value="0"><label>500</label></div>
                    <div class="eq-slider-col"><input type="range" class="eq-slider" id="eqSlider5" min="-12" max="12" value="0"><label>1k</label></div>
                    <div class="eq-slider-col"><input type="range" class="eq-slider" id="eqSlider6" min="-12" max="12" value="0"><label>2k</label></div>
                    <div class="eq-slider-col"><input type="range" class="eq-slider" id="eqSlider7" min="-12" max="12" value="0"><label>4k</label></div>
                    <div class="eq-slider-col"><input type="range" class="eq-slider" id="eqSlider8" min="-12" max="12" value="0"><label>8k</label></div>
                    <div class="eq-slider-col"><input type="range" class="eq-slider" id="eqSlider9" min="-12" max="12" value="0"><label>16k</label></div>
                </div>
            </div>

            <div class="control-group">
                <h3>Playback</h3>
                <div class="slider-row">
                    <label>Speed</label>
                    <input type="range" id="speedSlider" min="0.5" max="2" step="0.05" value="1">
                    <span id="speedLabel">1.00x</span>
                </div>

                <div class="toggle-row">
                    <label class="win-switch">
                        <input type="checkbox" id="preservePitch" checked>
                        <span class="win-switch-label">Change speed only</span>
                    </label>
                </div>
            </div>

            <div class="control-group">
                <h3>Reverb</h3>
                <div class="slider-row">
                    <label>Dry</label>
                    <input type="range" id="drySlider" min="0" max="1" step="0.05" value="1">
                </div>
                <div class="slider-row">
                    <label>Wet</label>
                    <input type="range" id="wetSlider" min="0" max="1" step="0.05" value="0">
                </div>
            </div>
        </div>
    </div>

    <audio id="audioElement" msAudioCategory="BackgroundCapableMedia" crossorigin="anonymous"></audio>
    <script src="app.js"></script>
</body>
</html>
