<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="icon" type="image/png" href="icon.png">
    <title>DrayMusic</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link href="google.css" rel="stylesheet">
    <style>
        #errorScreen {
            position: fixed;
            width: 100%;
            height: 100%;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: #640000 !important;
            font-family: system-ui, "Segoe UI", Roboto;
        }

        .error-inner {
            text-align: center;
        }

        .error-title {
            margin: 0 0 8px;
            color: #fff;
            font-size: 1.6rem;
        }

        .error-message {
            margin: 0 0 18px;
            color: #fff;
            line-height: 1.4;
        }
    </style>
</head>
<body class="win-dark">
    <img id="body-bg" src="gradient.gif" aria-hidden="true">
    <header class="app-header">
        <h1>DrayMusic</h1>
        <div class="search-pill">
            <span class="material-symbols-rounded">search</span>
            <input type="text" id="searchInput" placeholder="Search songs or artists...">
        </div>
    </header>
    <main id="songList" class="scroll-area">
    </main>
    <section class="mini-player">
        <div class="progress-wrapper">
            <input type="range" id="seekBar" value="0" step="0.1">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="player-controls-row">
            <div class="track-info" id="openFullPlayer">
                <img id="currentArt" src="placeholder.png">
                <div class="text-group">
                    <h4 id="currentTitle">Not Playing</h4>
                    <p id="currentArtist">Select a song</p>
                </div>
            </div>
            <div class="action-btns">
                <button id="btnEQ" class="icon-btn wigdisable"><span class="material-symbols-rounded">tune</span></button>
                <button id="btnLoop" class="icon-btn"><span class="material-symbols-rounded">repeat</span></button>
                <button id="btnPrev" class="icon-btn"><span class="material-symbols-rounded">skip_previous</span></button>
                <button id="btnPlayPause" class="main-play-btn"><span class="material-symbols-rounded">play_arrow</span></button>
                <button id="btnNext" class="icon-btn"><span class="material-symbols-rounded">skip_next</span></button>
            </div>
        </div>
    </section>
    <div id="errorScreen" aria-live="assertive" role="alert" hidden>
        <div class="error-inner">
            <h2 class="error-title">This app is no longer supported</h2>
            <p id="errorMessage" class="error-message">Check DraydenYT Projects Server for more info, Thanks :)</p>
        </div>
    </div>
    <div id="eqPane" class="side-pane">
        <div class="pane-header">
            <h2>Audio Settings</h2>
            <button id="btnCloseEQ" class="icon-btn"><span class="material-symbols-rounded">close</span></button>
        </div>
        <div class="pane-content">
            <div class="control-group">
                <h3>Equalizer</h3>
                <div class="eq-sliders 10-band">
                    <div class="eq-slider-col"><input type="range" class="eq-slider" id="eqSlider0" min="-12" max="12" value="0"><label>31</label></div>
                    <div class="eq-slider-col"><input type="range" class="eq-slider" id="eqSlider1" min="-12" max="12" value="0"><label>62</label></div>
                    <div class="eq-slider-col"><input type="range" class="eq-slider" id="eqSlider2" min="-12" max="12" value="0"><label>125</label></div>
                    <div class="eq-slider-col"><input type="range" class="eq-slider" id="eqSlider3" min="-12" max="12" value="0"><label>250</label></div>
                    <div class="eq-slider-col"><input type="range" class="eq-slider" id="eqSlider4" min="-12" max="12" value="0"><label>500</label></div>
                    <div class="eq-slider-col"><input type="range" class="eq-slider" id="eqSlider5" min="-12" max="12" value="0"><label>1k</label></div>
                    <div class="eq-slider-col"><input type="range" class="eq-slider" id="eqSlider6" min="-12" max="12" value="0"><label>2k</label></div>
                    <div class="eq-slider-col"><input type="range" class="eq-slider" id="eqSlider7" min="-12" max="12" value="0"><label>4k</label></div>
                    <div class="eq-slider-col"><input type="range" class="eq-slider" id="eqSlider8" min="-12" max="12" value="0"><label>8k</label></div>
                    <div class="eq-slider-col"><input type="range" class="eq-slider" id="eqSlider9" min="-12" max="12" value="0"><label>16k</label></div>
                </div>
            </div>

            <div class="control-group">
                <h3>Playback</h3>
                <div class="slider-row">
                    <label>Speed</label>
                    <input type="range" id="speedSlider" min="0.5" max="2" step="0.05" value="1">
                    <span id="speedLabel">1.00x</span>
                </div>
                <div class="toggle-row">
                    <label class="win-switch">
                        <input type="checkbox" id="preservePitch" checked>
                        <span class="win-switch-label">Lock Pitch to 1x</span>
                    </label>
                </div>
            </div>

            <div class="control-group">
                <h3>Reverb</h3>
                <div class="slider-row">
                    <label>Dry</label>
                    <input type="range" id="drySlider" min="0" max="1" step="0.05" value="1">
                </div>
                <div class="slider-row">
                    <label>Wet</label>
                    <input type="range" id="wetSlider" min="0" max="1" step="0.05" value="0">
                </div>
            </div>
        </div>
    </div>
    <audio id="audioElement" crossorigin="anonymous"></audio>
    <script src="app.js"></script>
</body>
</html>
