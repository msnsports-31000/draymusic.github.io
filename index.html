<html>
<head>
    <meta charset="utf-8" />
    <title>DraydenYT's Website</title>
    <link rel="icon" type="image/png" href="favicon.png" />
    <style>
        html,
        body {
            overflow: hidden;
            margin: 0;
            height: 100%;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Helvetica Neue", Arial, sans-serif;
            background: #111;
            color: #fff;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            cursor: default;
            background-image: url(https://www.absoluteescapes.com/wp-content/uploads/2023/06/The-Howgill-Fells-Yorkshire-Dales-National-Park-social-opt.jpg);
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        img {
            pointer-events: none;
        }

        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            backdrop-filter: blur(512px);
            -webkit-backdrop-filter: blur(512px);
            background-color: rgba(108, 108, 108, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 1;
            visibility: visible;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

            #splash-screen.fade-out {
                opacity: 0;
                visibility: hidden;
            }

            #splash-screen img {
                width: 300px;
                height: 300px;
            }

        header {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            background-color: rgba(108, 108, 108, 0.3);
            padding: 20px 20px 20px 40px;
            font-size: 50px;
            font-weight: 100;
            flex: 0 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            z-index: 500;
        }

        .header-buttons button {
            background-color: transparent;
            border: none;
            color: #fff;
            font-size: 20px;
            padding: 8px 20px;
            margin-left: 15px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 240px;
        }

            .header-buttons button:hover {
                color: #640000;
            }

        .header-buttons {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #appContainer {
            flex: 1 1 auto;
            overflow-y: auto;
            position: relative;
        }

        .apps-container {
            display: -ms-flexbox;
            display: -webkit-flex;
            display: flex;
            -ms-flex-wrap: wrap;
            -webkit-flex-wrap: wrap;
            flex-wrap: wrap;
            padding: 15px;
        }

            .apps-container > div {
                margin: 5px;
            }

        .app {
            width: 160px;
            height: 160px;
            overflow: hidden;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            background-color: rgba(108, 108, 108, 0.3);
            border-radius: 15px;
            padding: 15px;
            transition: 0.2s;
            text-align: center;
        }

            .app:active {
                background: #252525;
                transform: scale(0.9);
            }

            .app img {
                width: 90px;
                height: 90px;
                background-color: rgba(108, 108, 108, 0.3);
                border-radius: 15px;
                margin-bottom: 10px;
            }

        .store-app {
            width: 160px;
            height: 160px;
            overflow: hidden;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            background-color: rgba(108, 108, 108, 0.3);
            border-radius: 15px;
            padding: 15px;
            transition: 0.2s;
            text-align: center;
        }

            .store-app:active {
                background: #252525;
                transform: scale(0.9);
            }

            .store-app img {
                width: 90px;
                height: 90px;
                background-color: rgba(108, 108, 108, 0.3);
                border-radius: 15px;
                margin-bottom: 10px;
            }

        .store-app-name {
            font-weight: bold;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 5px;
        }

        .store-app-pub {
            font-size: 11px;
            opacity: 0.7;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 1000;
        }

            #overlay.open {
                opacity: 1;
                pointer-events: auto;
            }

        #details {
            position: fixed;
            top: 0;
            right: -1000px;
            width: 400px;
            height: 100%;
            padding: 20px;
            overflow-y: auto;
            transition: 0.3s;
            opacity: 0;
            z-index: 1100;
        }

            #details.open {
                right: 0;
                opacity: 1;
                backdrop-filter: blur(100px);
                -webkit-backdrop-filter: blur(100px);
                background-color: rgba(108, 108, 108, 0.3);
            }

            #details * {
                opacity: 0;
                transition: 1s;
            }

            #details.open * {
                opacity: 1;
            }

        #storeDetails {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backdrop-filter: blur(100px);
            -webkit-backdrop-filter: blur(100px);
            background-color: rgba(108, 108, 108, 0.3);
            padding: 30px;
            box-sizing: border-box;
            overflow-y: auto;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 900;
        }

            #storeDetails.open {
                opacity: 1;
                pointer-events: auto;
            }

            #storeDetails * {
                opacity: 0;
                transition: 0.6s ease;
            }

            #storeDetails.open * {
                opacity: 1;
            }

        .close-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 40px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.2s;
        }

            .close-btn:hover {
                background: #ff0000;
            }

        .screenshots img {
            width: 100%;
            border-radius: 10px;
            margin-bottom: 25px;
        }

        #storeSearchContainer {
            padding: 20px 20px 0 20px;
        }

        #storeSearch {
            width: 100%;
            max-width: 600px;
            padding: 15px 20px;
            border-radius: 25px;
            border: none;
            background-color: rgba(108, 108, 108, 0.3);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            color: #fff;
            font-size: 16px;
            outline: none;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            transition: 0.2s;
        }

            #storeSearch::placeholder {
                color: rgba(255,255,255,0.7);
            }

            #storeSearch:focus {
                background-color: rgba(150, 150, 150, 0.4);
            }

        .download-btn {
            background-color: #0078d7;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin-top: 15px;
            transition: background-color 0.2s, transform 0.1s;
        }

            .download-btn:hover {
                background-color: #005a9e;
            }

            .download-btn:active {
                transform: scale(0.95);
            }

        .pub-link {
            color: #4da6ff;
            cursor: pointer;
            text-decoration: underline;
        }

            .pub-link:hover {
                color: #99ccff;
            }

        #musicNotif {
            position: fixed;
            top: 20px;
            right: -400px;
            width: 320px;
            background-color: rgba(108, 108, 108, 0.3);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 15px;
            padding: 15px;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            transition: right 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
            z-index: 2000;
        }

            #musicNotif.show {
                right: 20px;
            }

        #musicNotifArt {
            width: 55px;
            height: 55px;
            border-radius: 10px;
            margin-right: 15px;
            background-color: rgba(0, 0, 0, 0.3);
            object-fit: cover;
        }

        #musicNotifInfo {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            white-space: nowrap;
        }

        #musicNotifTitle {
            font-weight: bold;
            font-size: 15px;
            margin-bottom: 4px;
            text-overflow: ellipsis;
            overflow: hidden;
        }

        #musicNotifArtist {
            font-size: 13px;
            opacity: 0.65;
            text-overflow: ellipsis;
            overflow: hidden;
        }

        #musicCtrlBtn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 200px;
            height: 60px;
            border-radius: 30px;
            background-color: rgba(108, 108, 108, 0.3);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: none;
            color: #fff;
            font-size: 24px;
            z-index: 2000;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

            #musicCtrlBtn:active {
                transform: scale(0.9);
                background: #252525;
            }

        #widthWarning {
            width: 100%;
            text-align: center;
            padding: 5px 0;
            background-color: #ff0000;
            font-size: 20px;
            font-weight: 600;
            display: none;
            z-index: 3000;
        }

        @media (max-width: 1100px) {
            #widthWarning {
                display: block;
            }

            header {
                font-size: 25px;
                font-weight: 700;
            }

            .header-buttons button {
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <div id="widthWarning">We recommend a wider screen for this website to look good</div>

    <div id="splash-screen">
        <div class="splash-content">
            <img src="splash.png" class="splash-logo">
        </div>
    </div>

    <header>
        <div class="title">DraydenYT's Website</div>
        <div class="header-buttons">
            <button onclick="showPage('projectsPage')">Projects</button>
            <button onclick="showPage('storePage')">10Store</button>
            <button onclick="window.open('https://www.youtube.com/@DraydenYT', '_blank')">YouTube</button>
            <button onclick="window.open('https://discord.gg/9V8fX4BxPn', '_blank')">Join our Community</button>
        </div>
    </header>

    <div id="appContainer">
        <div id="projectsPage"
             style="
                    position: absolute;
                    top: 0;
                    left: 0;
                    width: 100%;
                    opacity: 1;
                    transform: scale(1);
                    transition:
                        opacity 0.4s ease,
                        transform 0.4s ease;
                    pointer-events: auto;
                    box-sizing: border-box;
                ">
            <div id="apps" class="apps-container"></div>
        </div>

        <div id="storePage"
             style="
                    position: absolute;
                    top: 0;
                    left: 0;
                    width: 100%;
                    opacity: 0;
                    transform: scale(0.95);
                    transition:
                        opacity 0.4s ease,
                        transform 0.4s ease;
                    pointer-events: none;
                    box-sizing: border-box;
                ">
            <div id="storeSearchContainer">
                <input type="text" id="storeSearch" placeholder="Search 10Store" />
            </div>
            <div id="storeApps" class="apps-container"></div>
        </div>
    </div>

    <div id="overlay"></div>

    <div id="details">
        <button class="close-btn" id="closeBtn">×</button>
        <div id="detailsContent"></div>
    </div>

    <div id="storeDetails">
        <button class="close-btn" id="storeCloseBtn">×</button>
        <div id="storeDetailsContent"></div>
    </div>

    <audio id="bgAudio"></audio>
    <div id="musicNotif">
        <img id="musicNotifArt" src="" alt="Art" />
        <div id="musicNotifInfo">
            <div id="musicNotifTitle">Now playing:</div>
            <div id="musicNotifArtist">By</div>
        </div>
    </div>
    <button id="musicCtrlBtn">► Play Music</button>

    <script>
        document.oncontextmenu = function (e) {
            var event = e || window.event;
            if (event.preventDefault) {
                event.preventDefault();
            }
            return false;
        };

        function $(id) {
            return document.getElementById(id);
        }

        function showPage(pageId) {
            $("projectsPage").style.opacity = pageId === "projectsPage" ? "1" : "0";
            $("projectsPage").style.transform = pageId === "projectsPage" ? "scale(1)" : "scale(0.95)";
            $("projectsPage").style.pointerEvents = pageId === "projectsPage" ? "auto" : "none";
            $("storePage").style.opacity = pageId === "storePage" ? "1" : "0";
            $("storePage").style.transform = pageId === "storePage" ? "scale(1)" : "scale(0.95)";
            $("storePage").style.pointerEvents = pageId === "storePage" ? "auto" : "none";
            if (pageId !== "projectsPage") closeProjectDetails();
            if (pageId !== "storePage") closeStoreDetails();
        }

        function openProjectDetails(app) {
            var d = $("details");
            var c = $("detailsContent");
            var desc = app.description ? app.description : "No description";
            var html =
                "<h2>" + app.name + "</h2>" +
                "<p><b>Version:</b> " + app.version + "</p>" +
                "<p>" + app.publisher + "</p>" +
                "<p><b>Description:</b><br>" + desc + "</p>" +
                "<p><b>Download Link:</b><br><a href='" + app["package"] + "' target='_blank'>" + app["package"] + "</a></p>";

            var hasScreenshots = false;
            var screenshotsHtml = "<div class='screenshots'><h3>Screenshots</h3>";
            for (var key in app) {
                if (app.hasOwnProperty(key) && key.indexOf("screenshot") === 0) {
                    hasScreenshots = true;
                    screenshotsHtml += "<img src='" + app[key] + "'>";
                }
            }

            screenshotsHtml += "</div>";
            if (hasScreenshots) html += screenshotsHtml;
            c.innerHTML = html;
            if (d.className.indexOf("open") === -1) {
                d.className += " open";
            }

            var overlay = $("overlay");
            if (overlay && overlay.className.indexOf("open") === -1) {
                overlay.className += " open";
            }
        }

        function closeProjectDetails() {
            var d = $("details");
            d.className = d.className.replace(/(?:^|\s)open(?!\S)/g, "");
            var overlay = $("overlay");
            if (overlay) {
                overlay.className = overlay.className.replace(/(?:^|\s)open(?!\S)/g, "");
            }
        }

        var closeBtn = $("closeBtn");
        if (closeBtn) closeBtn.onclick = closeProjectDetails;
        var overlay = $("overlay");
        if (overlay) overlay.onclick = closeProjectDetails;

        function openStoreDetails(app) {
            var sd = $("storeDetails");
            var sc = $("storeDetailsContent");
            var desc = app.description ? app.description : "No description";
            var safePublisher = app.publisher.replace(/"/g, '&quot;').replace(/'/g, '\\\'');
            var html =
                "<div style='display:flex; align-items:center; margin-bottom:20px;'>" +
                "<img src='" + app.icon + "' style='width:120px; height:120px; border-radius:25px; margin-right:30px; background-color:rgba(108,108,108,0.3); pointer-events:none;'>" +
                "<div>" +
                "<h1 style='margin:0 0 10px 0; font-size:45px;'>" + app.name + "</h1>" +
                "<p style='margin:0; font-size:18px;'><b>Publisher:</b> <span class='pub-link' onclick='searchPublisher(\"" + safePublisher + "\")'>" + app.publisher + "</span></p>" +
                "<p style='margin:5px 0; font-size:16px;'><b>Version:</b> " + app.version + " | <b>OS:</b> " + app.osText + "</p>" +
                "<a href='" + app["package"] + "' target='_blank' class='download-btn'>Download App</a>" +
                "</div>" +
                "</div>" +
                "<div style='max-width:800px;'>" +
                "<h3>Description</h3>" +
                "<p style='line-height:1.6;'>" + desc + "</p>" +
                "</div>";
            var hasScreenshots = false;
            var screenshotsHtml = "<div class='screenshots' style='max-width:800px; margin-top:30px;'><h3>Screenshots</h3>";
            for (var key in app) {
                if (app.hasOwnProperty(key) && key.indexOf("screenshot") === 0) {
                    hasScreenshots = true;
                    screenshotsHtml += "<img src='" + app[key] + "'>";
                }
            }

            screenshotsHtml += "</div>";
            if (hasScreenshots) html += screenshotsHtml;
            sc.innerHTML = html;
            if (sd.className.indexOf("open") === -1) {
                sd.className += " open";
            }
        }

        function closeStoreDetails() {
            var sd = $("storeDetails");
            sd.className = sd.className.replace(/(?:^|\s)open(?!\S)/g, "");
        }

        var storeCloseBtn = $("storeCloseBtn");
        if (storeCloseBtn) storeCloseBtn.onclick = closeStoreDetails;

        function searchPublisher(publisherName) {
            closeStoreDetails();
            var searchInput = $("storeSearch");
            searchInput.value = publisherName;
            filterStoreApps();
        }

        function filterStoreApps() {
            var query = $("storeSearch").value.toLowerCase();
            var apps = $("storeApps").children;
            for (var i = 0; i < apps.length; i++) {
                var text = apps[i].innerText.toLowerCase();
                if (text.indexOf(query) > -1) {
                    apps[i].style.display = "";
                } else {
                    apps[i].style.display = "none";
                }
            }
        }

        $("storeSearch").onkeyup = filterStoreApps;
        var xhr = window.XMLHttpRequest ? new XMLHttpRequest() : new ActiveXObject("Microsoft.XMLHTTP");
        xhr.open("GET", "https://raw.githubusercontent.com/draydenthemiiyt-maker/10-Store/main/apps.xml", true);
        xhr.onreadystatechange = function () {
            if (xhr.readyState === 4 && (xhr.status === 200 || xhr.status === 0)) {
                var xml = xhr.responseXML;
                if (!xml && xhr.responseText) {
                    if (window.DOMParser) {
                        var parser = new DOMParser();
                        xml = parser.parseFromString(xhr.responseText, "text/xml");
                    } else {
                        var xmlDoc = new ActiveXObject("Microsoft.XMLDOM");
                        xmlDoc.async = false;
                        xmlDoc.loadXML(xhr.responseText);
                        xml = xmlDoc;
                    }
                }

                if (!xml) return;
                var apps = xml.getElementsByTagName("app");
                var projectsContainer = $("apps");
                var storeContainer = $("storeApps");
                var parsedApps = [];
                for (var i = 0; i < apps.length; i++) {
                    var appNode = apps[i];
                    var getTextValue = function (tagName) {
                        var nodes = appNode.getElementsByTagName(tagName);
                        return nodes.length > 0 && nodes[0].childNodes.length > 0
                            ? nodes[0].childNodes[0].nodeValue
                            : "";
                    };

                    var publisher = getTextValue("publisher");
                    var name = getTextValue("name");
                    var icon = getTextValue("icon");
                    var version = getTextValue("version");
                    var description = getTextValue("description");
                    var pkg = getTextValue("package");
                    var isDrayYTProject = getTextValue("drayYTproject").toLowerCase().indexOf("true") > -1;
                    var isPC = getTextValue("pcCapable").toLowerCase().indexOf("true") > -1;
                    var isMobile = getTextValue("mobileCapable").toLowerCase().indexOf("true") > -1;
                    var isWin8 = getTextValue("win81compatible").toLowerCase().indexOf("true") > -1;
                    var osText = "";
                    if (isPC && isWin8) {
                        osText = "Windows 8.1 and up";
                    } else if (isMobile && !isPC) {
                        osText = "Windows 10 Mobile and up";
                    } else {
                        osText = "Windows 10 and up";
                    }

                    var appObj = {
                        name: name,
                        icon: icon,
                        version: version,
                        publisher: publisher,
                        description: description,
                        package: pkg,
                        osText: osText,
                        isDrayYTProject: isDrayYTProject
                    };

                    var children = appNode.childNodes;
                    for (var j = 0; j < children.length; j++) {
                        var n = children[j];
                        if (n.nodeType === 1) {
                            var tagName = n.tagName.toLowerCase();
                            if (tagName.indexOf("screenshot") === 0) {
                                appObj[tagName] = n.childNodes.length > 0 ? n.childNodes[0].nodeValue : "";
                            }
                        }
                    }

                    parsedApps.push(appObj);
                }

                for (var k = parsedApps.length - 1; k > 0; k--) {
                    var randIdx = Math.floor(Math.random() * (k + 1));
                    var temp = parsedApps[k];
                    parsedApps[k] = parsedApps[randIdx];
                    parsedApps[randIdx] = temp;
                }

                for (var m = 0; m < parsedApps.length; m++) {
                    var currentApp = parsedApps[m];
                    if (currentApp.isDrayYTProject) {
                        var pDiv = document.createElement("div");
                        pDiv.className = "app";
                        pDiv.innerHTML =
                            "<img src='" + currentApp.icon + "'>" +
                            "<div><b>" + currentApp.name + "</b></div>" +
                            "<div style='filter:alpha(opacity=70); opacity:0.7; font-size:10px;'>" + currentApp.description + "</div>";

                        (function (obj) {
                            pDiv.onclick = function () {
                                openProjectDetails(obj);
                            };
                        })(currentApp);
                        projectsContainer.appendChild(pDiv);
                    }

                    var sDiv = document.createElement("div");
                    sDiv.className = "store-app";
                    sDiv.innerHTML =
                        "<img src='" + currentApp.icon + "'>" +
                        "<div class='store-app-name'>" + currentApp.name + "</div>" +
                        "<div class='store-app-pub'>" + currentApp.publisher + "</div>";

                    (function (obj) {
                        sDiv.onclick = function () {
                            openStoreDetails(obj);
                        };
                    })(currentApp);
                    storeContainer.appendChild(sDiv);
                }
            }
        };
        xhr.send();

        var songList = [];
        var bgAudio = $("bgAudio");
        var notifTimeout;
        var isPlaying = false;
        var musicCtrlBtn = $("musicCtrlBtn");
        var musicXhr = window.XMLHttpRequest ? new XMLHttpRequest() : new ActiveXObject("Microsoft.XMLHTTP");
        musicXhr.open("GET", "https://draydenthemiiyt-maker.github.io/draymusic.github.io/music.xml", true);
        musicXhr.onreadystatechange = function () {
            if (musicXhr.readyState === 4 && (musicXhr.status === 200 || musicXhr.status === 0)) {
                var xml = musicXhr.responseXML;
                if (!xml && musicXhr.responseText) {
                    if (window.DOMParser) {
                        var parser = new DOMParser();
                        xml = parser.parseFromString(musicXhr.responseText, "text/xml");
                    } else {
                        var xmlDoc = new ActiveXObject("Microsoft.XMLDOM");
                        xmlDoc.async = false;
                        xmlDoc.loadXML(musicXhr.responseText);
                        xml = xmlDoc;
                    }
                }
                if (!xml) return;
                var songs = xml.getElementsByTagName("song");
                for (var i = 0; i < songs.length; i++) {
                    var node = songs[i];
                    var getVal = function (tag) {
                        var n = node.getElementsByTagName(tag);
                        return n.length > 0 && n[0].childNodes.length > 0 ? n[0].childNodes[0].nodeValue : "";
                    };
                    songList.push({
                        title: getVal("title"),
                        artist: getVal("artist"),
                        albumArt: getVal("albumArt"),
                        url: getVal("url"),
                    });
                }
            }
        };
        musicXhr.send();

        function playRandomSong() {
            if (songList.length === 0) return;
            var randIdx = Math.floor(Math.random() * songList.length);
            var song = songList[randIdx];
            bgAudio.src = song.url;
            var playPromise = bgAudio.play();
            isPlaying = true;
            musicCtrlBtn.innerHTML = "&#9724; Stop Music";
            $("musicNotifArt").src = song.albumArt;
            $("musicNotifTitle").innerHTML = "Now playing: " + song.title;
            $("musicNotifArtist").innerHTML = "Powered by DrayMusic | Song By " + song.artist;
            var notif = $("musicNotif");
            if (notif.className.indexOf("show") === -1) {
                notif.className += " show";
            }

            clearTimeout(notifTimeout);
            notifTimeout = setTimeout(function () {
                notif.className = notif.className.replace(/(?:^|\s)show(?!\S)/g, "");
            }, 6000);

            if (playPromise !== undefined) {
                playPromise.catch(function (error) {
                    isPlaying = false;
                    musicCtrlBtn.innerHTML = "&#9658; Play Music";
                });
            }
        }

        bgAudio.onended = function () {
            playRandomSong();
        };

        musicCtrlBtn.onclick = function () {
            if (isPlaying) {
                bgAudio.pause();
                bgAudio.currentTime = 0;
                isPlaying = false;
                this.innerHTML = "&#9658; Play Music";
                var notif = $("musicNotif");
                notif.className = notif.className.replace(/(?:^|\s)show(?!\S)/g, "");
            } else {
                playRandomSong();
            }
        };

        window.addEventListener('load', function () {
            var splashScreen = document.getElementById('splash-screen');
            var displayDuration = 1500;
            setTimeout(function () {
                if (splashScreen.classList) {
                    splashScreen.classList.add('fade-out');
                } else {
                    splashScreen.className += ' fade-out';
                }
            }, displayDuration);
        });
    </script>
</body>
</html>
