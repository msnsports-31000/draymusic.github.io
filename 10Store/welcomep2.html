<!doctype html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link id="winjs-theme" href="" rel="stylesheet" />
    <script src="ms-appx-web:///lib/winjs-4.0.1/js/base.js"></script>
    <script src="ms-appx-web:///lib/winjs-4.0.1/js/ui.js"></script>
    <style>
html, body {
    margin: 0;
    padding: 0;
    /* Force scrolling to be allowed on the Y axis */
    overflow-y: auto !important; 
    /* Ensure the body can grow beyond the screen height */
    height: auto; 
    min-height: 100%;
}

.container {
    max-width: 900px;
    margin: 40px auto;
    padding: 0 20px;
    text-align: center;
    /* Extra padding at bottom so buttons aren't cut off when scrolling */
    padding-bottom: 50px; 
}

        .title {
            font-size: 38px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .rules-frame {
            width: 100%;
            height: 350px;
            border: 2px solid #ccc;
            background: white;
        }

        .btn-row {
            margin-top: 24px;
            display: flex;
            justify-content: center;
        }

        .btn-row button {
            margin: 0 10px;
        }
    </style>
</head>
<body class="win-type-body">
    <div class="container">
        <div class="title">Before using 10Store, please read the rules.</div>
        <iframe class="rules-frame" src="rules.txt"></iframe>
        <div class="btn-row">
            <button id="backBtn" class="win-button">Back</button>
            <button id="agreeBtn" class="win-button">Agree</button>
        </div>
    </div>
    <script>
        document.getElementById("backBtn").onclick = function () {
            window.location.href = "welcome.html";
        };
        document.getElementById("agreeBtn").onclick = function () {
            window.location.href = "welcomeend.html";
        };
    </script>
    <audio src="ms-appx-web:///assets/info.wav" autoplay></audio>
</body>
</html>
